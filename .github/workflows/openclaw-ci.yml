name: OpenClaw release checks

on:
  push:
    paths:
      - "openclaw/**"
      - "skills/**"
      - "scripts/python/**"
      - "templates/**"
      - ".github/workflows/openclaw-ci.yml"
  pull_request:
    paths:
      - "openclaw/**"
      - "skills/**"
      - "scripts/python/**"
      - "templates/**"
      - ".github/workflows/openclaw-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r openclaw/requirements.txt
      - name: Verify OpenClaw release
        run: python openclaw/verify.py
      - name: Test OpenClaw installer
        run: python -m unittest discover -s openclaw/tests -p "test*.py" -v
      - name: Test Product-Planning renderer
        run: python -m unittest discover -s scripts/python -p "test*.py" -v
      - name: Check sanitized package and Excel XML
        run: python scripts/python/check_package.py --path .
